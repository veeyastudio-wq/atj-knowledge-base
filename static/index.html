<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>ATJ — local dev</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; }

    /* ── Base styles: mobile-first (all viewports < 768px) ── */
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #faf9f7;
      color: #1c1b18;
      margin: 0;
      padding: 16px 12px;
    }

    h3 {
      margin: 0 0 12px;
      font-size: 1rem;
      font-weight: 600;
    }

    #messages {
      background: #fff;
      border: 1px solid #e0ddd9;
      border-radius: 6px;
      min-height: 200px;
      max-height: 55vh;
      padding: 12px;
      overflow-y: auto;
      margin-bottom: 10px;
    }

    .turn { margin: 10px 0; }
    .label { font-weight: bold; }
    .label-user { }
    .label-atj { }
    .text { white-space: pre-wrap; font-size: 0.9375rem; line-height: 1.5; }
    .fallback-tag { color: #c00; font-size: 0.8em; margin-left: 6px; }

    #input-row { display: flex; gap: 8px; }

    #msg-input {
      flex: 1;
      min-width: 0;
      padding: 10px 12px;
      font-family: inherit;
      font-size: 16px;
      border: 1px solid #c8c4be;
      border-radius: 6px;
      background: #fff;
    }

    #send-btn {
      min-height: 44px;
      min-width: 64px;
      padding: 0 18px;
      font-family: inherit;
      font-size: 1rem;
    }

    #status {
      font-size: 0.75rem;
      color: #a8a39c;
      margin-top: 6px;
      min-height: 1.2em;
    }

    /* ── Shared card ── */
    .ui-card {
      background: #fff;
      border: 1px solid #e0ddd9;
      border-radius: 6px;
      padding: 16px;
      margin-bottom: 24px;
      margin-top: 10px;
    }

    .ui-card-title {
      font-size: 15px;
      font-weight: 600;
      color: #1c1b18;
      margin-bottom: 20px;
    }

    /* ── Timeline ── */
    .timeline {
      position: relative;
    }

    .timeline-stage {
      display: flex;
      gap: 16px;
      position: relative;
    }

    /* vertical connector between stages */
    .timeline-stage:not(:last-child) .stage-spine::after {
      content: "";
      display: block;
      width: 1px;
      background: #e0ddd9;
      flex: 1;
      margin: 4px auto 0;
    }

    .stage-spine {
      display: flex;
      flex-direction: column;
      align-items: center;
      width: 20px;
      flex-shrink: 0;
    }

    .stage-dot {
      width: 12px;
      height: 12px;
      border-radius: 50%;
      flex-shrink: 0;
      margin-top: 4px;
    }

    .timeline-stage[data-status="complete"] .stage-dot {
      background: #5a8c5e;
    }

    .timeline-stage[data-status="current"] .stage-dot {
      background: #3a6496;
      box-shadow: 0 0 0 3px rgba(58, 100, 150, 0.15);
      width: 14px;
      height: 14px;
      margin-top: 3px;
    }

    .timeline-stage[data-status="upcoming"] .stage-dot {
      background: #fff;
      border: 2px solid #c8c4be;
    }

    .stage-body {
      padding-bottom: 20px;
      flex: 1;
    }

    .timeline-stage:last-child .stage-body {
      padding-bottom: 0;
    }

    .stage-label {
      font-size: 14px;
      font-weight: 500;
      line-height: 1.3;
    }

    .timeline-stage[data-status="complete"] .stage-label {
      color: #5a8c5e;
    }

    .timeline-stage[data-status="current"] .stage-label {
      color: #3a6496;
      font-weight: 600;
    }

    .timeline-stage[data-status="upcoming"] .stage-label {
      color: #6e6b65;
    }

    .stage-date {
      font-size: 12px;
      color: #a8a39c;
      margin-top: 1px;
    }

    .stage-desc {
      font-size: 13px;
      color: #6e6b65;
      margin-top: 4px;
      line-height: 1.45;
    }

    /* ── Checklist ── */
    .checklist {
      display: flex;
      flex-direction: column;
      gap: 14px;
    }

    .checklist-item {
      display: flex;
      gap: 12px;
      align-items: flex-start;
    }

    .checklist-item input[type="checkbox"] {
      width: 16px;
      height: 16px;
      flex-shrink: 0;
      margin-top: 2px;
      accent-color: #5a8c5e;
      cursor: default;
    }

    .checklist-content {
      flex: 1;
    }

    .checklist-label {
      font-size: 14px;
      font-weight: 500;
      line-height: 1.3;
    }

    .checklist-item.done .checklist-label {
      color: #a8a39c;
      text-decoration: line-through;
      text-decoration-color: #c8c4be;
      font-weight: 400;
    }

    .checklist-desc {
      font-size: 13px;
      color: #a8a39c;
      margin-top: 2px;
      line-height: 1.45;
    }

    .checklist-item:not(.done) .checklist-desc {
      color: #6e6b65;
    }

    /* ── Wider viewports (768px and above) ── */
    @media (min-width: 768px) {
      body {
        max-width: 760px;
        margin: 40px auto;
        padding: 0 16px;
      }

      #messages {
        min-height: 320px;
        max-height: 560px;
      }

      .ui-card {
        padding: 28px 32px;
        margin-bottom: 32px;
      }

      .ui-card-title {
        margin-bottom: 24px;
      }
    }
  </style>
</head>
<body>
  <h3>ATJ — local dev</h3>
  <div id="messages"></div>
  <div id="input-row">
    <input id="msg-input" type="text" placeholder="Type a message and press Enter…" autocomplete="off">
    <button id="send-btn">Send</button>
  </div>
  <div id="status"></div>

  <script>
    const USER_ID = "test_user_001";
    let sessionId = null;

    const messagesEl = document.getElementById("messages");
    const inputEl    = document.getElementById("msg-input");
    const sendBtn    = document.getElementById("send-btn");
    const statusEl   = document.getElementById("status");

    function appendTurn(role, text, fallback) {
      const turn = document.createElement("div");
      turn.className = "turn";

      const label = document.createElement("span");
      label.className = "label label-" + (role === "user" ? "user" : "atj");
      label.textContent = role === "user" ? "You:" : "ATJ:";
      turn.appendChild(label);

      if (fallback) {
        const tag = document.createElement("span");
        tag.className = "fallback-tag";
        tag.textContent = "[fallback]";
        turn.appendChild(tag);
      }

      const body = document.createElement("div");
      body.className = "text";
      body.textContent = text;
      turn.appendChild(body);

      messagesEl.appendChild(turn);
      messagesEl.scrollTop = messagesEl.scrollHeight;
    }

    function renderTimeline(fixture, container) {
      const card = document.createElement("div");
      card.className = "ui-card";

      const title = document.createElement("div");
      title.className = "ui-card-title";
      title.textContent = fixture.title;
      card.appendChild(title);

      const list = document.createElement("div");
      list.className = "timeline";

      fixture.stages.forEach(function(stage) {
        const row = document.createElement("div");
        row.className = "timeline-stage";
        row.dataset.status = stage.status;

        const spine = document.createElement("div");
        spine.className = "stage-spine";

        const dot = document.createElement("div");
        dot.className = "stage-dot";
        spine.appendChild(dot);
        row.appendChild(spine);

        const body = document.createElement("div");
        body.className = "stage-body";

        const label = document.createElement("div");
        label.className = "stage-label";
        label.textContent = stage.label;
        body.appendChild(label);

        if (stage.date) {
          const date = document.createElement("div");
          date.className = "stage-date";
          date.textContent = stage.date;
          body.appendChild(date);
        }

        if (stage.description) {
          const desc = document.createElement("div");
          desc.className = "stage-desc";
          desc.textContent = stage.description;
          body.appendChild(desc);
        }

        row.appendChild(body);
        list.appendChild(row);
      });

      card.appendChild(list);
      container.appendChild(card);
    }

    function renderChecklist(fixture, container) {
      const card = document.createElement("div");
      card.className = "ui-card";

      const title = document.createElement("div");
      title.className = "ui-card-title";
      title.textContent = fixture.title;
      card.appendChild(title);

      const list = document.createElement("div");
      list.className = "checklist";

      fixture.items.forEach(function(item) {
        const row = document.createElement("div");
        row.className = "checklist-item" + (item.done ? " done" : "");

        const checkbox = document.createElement("input");
        checkbox.type = "checkbox";
        checkbox.checked = item.done;
        checkbox.disabled = true;
        row.appendChild(checkbox);

        const content = document.createElement("div");
        content.className = "checklist-content";

        const label = document.createElement("div");
        label.className = "checklist-label";
        label.textContent = item.label;
        content.appendChild(label);

        if (item.description) {
          const desc = document.createElement("div");
          desc.className = "checklist-desc";
          desc.textContent = item.description;
          content.appendChild(desc);
        }

        row.appendChild(content);
        list.appendChild(row);
      });

      card.appendChild(list);
      container.appendChild(card);
    }

    async function send() {
      const message = inputEl.value.trim();
      if (!message) return;

      inputEl.value = "";
      sendBtn.disabled = true;
      statusEl.textContent = "Sending…";

      appendTurn("user", message, false);

      const payload = { user_id: USER_ID, message };
      if (sessionId) payload.session_id = sessionId;

      try {
        const res = await fetch("/chat", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify(payload),
        });

        if (!res.ok) {
          appendTurn("atj", "[HTTP " + res.status + "]", false);
          statusEl.textContent = "Error " + res.status;
          return;
        }

        const data = await res.json();
        sessionId = data.session_id;

        // Build the ATJ turn container. If the response text is non-empty,
        // show it. Then render any compliant tool_blocks below it in the same
        // turn. Blocks where compliant is false carry no tool_input (emptied
        // server-side) and are skipped silently.
        const atjTurn = document.createElement("div");
        atjTurn.className = "turn";

        const atjLabel = document.createElement("span");
        atjLabel.className = "label label-atj";
        atjLabel.textContent = "ATJ:";
        atjTurn.appendChild(atjLabel);

        if (data.fallback_triggered) {
          const tag = document.createElement("span");
          tag.className = "fallback-tag";
          tag.textContent = "[fallback]";
          atjTurn.appendChild(tag);
        }

        if (data.response) {
          const body = document.createElement("div");
          body.className = "text";
          body.textContent = data.response;
          atjTurn.appendChild(body);
        }

        (data.tool_blocks || []).forEach(function(block) {
          if (!block.compliant) return;
          if (block.tool_name === "render_timeline") {
            renderTimeline(block.tool_input, atjTurn);
          } else if (block.tool_name === "render_checklist") {
            renderChecklist(block.tool_input, atjTurn);
          }
        });

        messagesEl.appendChild(atjTurn);
        messagesEl.scrollTop = messagesEl.scrollHeight;

        statusEl.textContent =
          "session: " + sessionId +
          (data.fallback_triggered ? " | FALLBACK FIRED" : "");
      } catch (err) {
        appendTurn("atj", "[error: " + err.message + "]", false);
        statusEl.textContent = "Request failed";
      } finally {
        sendBtn.disabled = false;
        inputEl.focus();
      }
    }

    sendBtn.addEventListener("click", send);
    inputEl.addEventListener("keydown", function(e) {
      if (e.key === "Enter" && !e.shiftKey) send();
    });

    inputEl.focus();
  </script>
</body>
</html>
