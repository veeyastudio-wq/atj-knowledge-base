<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>ATJ — local dev</title>
  <style>
    body { font-family: monospace; max-width: 760px; margin: 40px auto; padding: 0 16px; }
    #messages { border: 1px solid #ccc; min-height: 320px; max-height: 560px; padding: 12px; overflow-y: auto; margin-bottom: 10px; }
    .turn { margin: 10px 0; }
    .label { font-weight: bold; }
    .label-user { }
    .label-atj { }
    .text { white-space: pre-wrap; }
    .fallback-tag { color: #c00; font-size: 0.8em; margin-left: 6px; }
    #input-row { display: flex; gap: 8px; }
    #msg-input { flex: 1; padding: 8px; font-family: monospace; font-size: 1em; }
    #send-btn { padding: 8px 16px; font-family: monospace; }
    #status { font-size: 0.8em; color: #666; margin-top: 6px; min-height: 1.2em; }
  </style>
</head>
<body>
  <h3>ATJ — local dev</h3>
  <div id="messages"></div>
  <div id="input-row">
    <input id="msg-input" type="text" placeholder="Type a message and press Enter…" autocomplete="off">
    <button id="send-btn">Send</button>
  </div>
  <div id="status"></div>

  <script>
    const USER_ID = "test_user_001";
    let sessionId = null;

    const messagesEl = document.getElementById("messages");
    const inputEl    = document.getElementById("msg-input");
    const sendBtn    = document.getElementById("send-btn");
    const statusEl   = document.getElementById("status");

    function appendTurn(role, text, fallback) {
      const turn = document.createElement("div");
      turn.className = "turn";

      const label = document.createElement("span");
      label.className = "label label-" + (role === "user" ? "user" : "atj");
      label.textContent = role === "user" ? "You:" : "ATJ:";
      turn.appendChild(label);

      if (fallback) {
        const tag = document.createElement("span");
        tag.className = "fallback-tag";
        tag.textContent = "[fallback]";
        turn.appendChild(tag);
      }

      const body = document.createElement("div");
      body.className = "text";
      body.textContent = text;
      turn.appendChild(body);

      messagesEl.appendChild(turn);
      messagesEl.scrollTop = messagesEl.scrollHeight;
    }

    async function send() {
      const message = inputEl.value.trim();
      if (!message) return;

      inputEl.value = "";
      sendBtn.disabled = true;
      statusEl.textContent = "Sending…";

      appendTurn("user", message, false);

      const payload = { user_id: USER_ID, message };
      if (sessionId) payload.session_id = sessionId;

      try {
        const res = await fetch("/chat", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify(payload),
        });

        if (!res.ok) {
          appendTurn("atj", "[HTTP " + res.status + "]", false);
          statusEl.textContent = "Error " + res.status;
          return;
        }

        const data = await res.json();
        sessionId = data.session_id;
        appendTurn("atj", data.response, data.fallback_triggered);
        statusEl.textContent =
          "session: " + sessionId +
          " | memory: " + data.memory_facts_retrieved + " fact(s)" +
          (data.memory_truncated ? " [truncated]" : "") +
          (data.fallback_triggered ? " | FALLBACK FIRED" : "");
      } catch (err) {
        appendTurn("atj", "[error: " + err.message + "]", false);
        statusEl.textContent = "Request failed";
      } finally {
        sendBtn.disabled = false;
        inputEl.focus();
      }
    }

    sendBtn.addEventListener("click", send);
    inputEl.addEventListener("keydown", function(e) {
      if (e.key === "Enter" && !e.shiftKey) send();
    });

    inputEl.focus();
  </script>
</body>
</html>
