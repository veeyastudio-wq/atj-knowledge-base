<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>ATJ — local dev</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; }

    /* ── Base styles: mobile-first (all viewports < 768px) ── */
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #faf9f7;
      color: #1c1b18;
      margin: 0;
      padding: 16px 12px;
    }

    h3 {
      margin: 0 0 12px;
      font-size: 1rem;
      font-weight: 600;
    }

    #messages {
      background: #fff;
      border: 1px solid #e0ddd9;
      border-radius: 6px;
      min-height: 200px;
      max-height: 55vh;
      padding: 12px;
      overflow-y: auto;
      margin-bottom: 10px;
    }

    .turn { margin: 10px 0; }
    .label { font-weight: bold; }
    .label-user { }
    .label-atj { }
    .text { white-space: pre-wrap; font-size: 0.9375rem; line-height: 1.5; }
    .fallback-tag { color: #c00; font-size: 0.8em; margin-left: 6px; }

    #input-row { display: flex; gap: 8px; }

    #msg-input {
      flex: 1;
      min-width: 0;
      padding: 10px 12px;
      font-family: inherit;
      font-size: 16px;
      border: 1px solid #c8c4be;
      border-radius: 6px;
      background: #fff;
    }

    #send-btn {
      min-height: 44px;
      min-width: 64px;
      padding: 0 18px;
      font-family: inherit;
      font-size: 1rem;
    }

    #stop-btn {
      min-height: 44px;
      min-width: 64px;
      padding: 0 18px;
      font-family: inherit;
      font-size: 1rem;
    }

    #status {
      font-size: 0.75rem;
      color: #a8a39c;
      margin-top: 6px;
      min-height: 1.2em;
    }

    /* ── Image upload ── */
    #img-input { display: none; }

    #img-label {
      min-height: 44px;
      min-width: 52px;
      padding: 0 12px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      font-family: inherit;
      font-size: 0.875rem;
      color: #6e6b65;
      background: #fff;
      border: 1px solid #c8c4be;
      border-radius: 6px;
      cursor: pointer;
      user-select: none;
      flex-shrink: 0;
    }

    #img-preview-row {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-top: 8px;
    }

    #img-preview-row[hidden] { display: none; }

    #img-preview {
      width: 52px;
      height: 52px;
      object-fit: cover;
      border-radius: 4px;
      border: 1px solid #e0ddd9;
    }

    #img-clear-btn {
      font-size: 0.8rem;
      color: #a8a39c;
      background: none;
      border: none;
      cursor: pointer;
      padding: 4px 6px;
      line-height: 1;
    }

    /* ── Source grounding ── */
    .sources-line {
      font-size: 0.75rem;
      color: #a8a39c;
      margin-top: 10px;
      line-height: 1.4;
    }

    /* ── Typing indicator ── */
    .typing-indicator {
      display: inline-flex;
      gap: 5px;
      align-items: center;
      padding: 6px 0 2px;
    }

    .typing-indicator span {
      display: block;
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: #c8c4be;
      animation: typing-dot 1.2s ease-in-out infinite;
    }

    .typing-indicator span:nth-child(2) { animation-delay: 0.2s; }
    .typing-indicator span:nth-child(3) { animation-delay: 0.4s; }

    @keyframes typing-dot {
      0%, 60%, 100% { opacity: 0.3; }
      30%            { opacity: 1;   }
    }

    /* ── Shared card ── */
    .ui-card {
      background: #fff;
      border: 1px solid #e0ddd9;
      border-radius: 6px;
      padding: 16px;
      margin-bottom: 24px;
      margin-top: 10px;
    }

    .ui-card-title {
      font-size: 15px;
      font-weight: 600;
      color: #1c1b18;
      margin-bottom: 20px;
    }

    /* ── Case file panel (mobile) ── */
    #case-panel { margin-top: 24px; }

    /* ── Panel turn rows ── */
    .panel-turn {
      padding: 8px 0;
      border-bottom: 1px solid #f0ede9;
      font-size: 0.875rem;
      line-height: 1.4;
    }
    .panel-turn:last-child { border-bottom: none; }

    .panel-turn-role {
      font-weight: 600;
      color: #1c1b18;
      margin-right: 6px;
      text-transform: capitalize;
    }

    .panel-turn-content {
      color: #6e6b65;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    /* ── Panel document rows ── */
    .panel-doc-row {
      padding: 8px 0;
      border-bottom: 1px solid #f0ede9;
      font-size: 0.875rem;
    }
    .panel-doc-row:last-child { border-bottom: none; }

    .panel-doc-label {
      font-weight: 500;
      color: #1c1b18;
    }

    .panel-doc-date {
      font-size: 0.75rem;
      color: #a8a39c;
      margin-top: 2px;
    }

    .panel-empty {
      font-size: 0.875rem;
      color: #a8a39c;
      padding: 8px 0;
    }

    /* ── History search ── */
    #history-search-row {
      display: flex;
      gap: 6px;
      margin-bottom: 12px;
    }

    #history-search-input {
      flex: 1;
      min-width: 0;
      padding: 7px 10px;
      font-family: inherit;
      font-size: 16px;
      border: 1px solid #c8c4be;
      border-radius: 6px;
      background: #fff;
    }

    #history-search-btn,
    #history-search-clear {
      padding: 7px 12px;
      font-family: inherit;
      font-size: 0.875rem;
      border: 1px solid #c8c4be;
      border-radius: 6px;
      background: #fff;
      cursor: pointer;
      white-space: nowrap;
    }

    /* ── Timeline ── */
    .timeline {
      position: relative;
    }

    .timeline-stage {
      display: flex;
      gap: 16px;
      position: relative;
    }

    /* vertical connector between stages */
    .timeline-stage:not(:last-child) .stage-spine::after {
      content: "";
      display: block;
      width: 1px;
      background: #e0ddd9;
      flex: 1;
      margin: 4px auto 0;
    }

    .stage-spine {
      display: flex;
      flex-direction: column;
      align-items: center;
      width: 20px;
      flex-shrink: 0;
    }

    .stage-dot {
      width: 12px;
      height: 12px;
      border-radius: 50%;
      flex-shrink: 0;
      margin-top: 4px;
    }

    .timeline-stage[data-status="complete"] .stage-dot {
      background: #5a8c5e;
    }

    .timeline-stage[data-status="current"] .stage-dot {
      background: #3a6496;
      box-shadow: 0 0 0 3px rgba(58, 100, 150, 0.15);
      width: 14px;
      height: 14px;
      margin-top: 3px;
    }

    .timeline-stage[data-status="upcoming"] .stage-dot {
      background: #fff;
      border: 2px solid #c8c4be;
    }

    .stage-body {
      padding-bottom: 20px;
      flex: 1;
    }

    .timeline-stage:last-child .stage-body {
      padding-bottom: 0;
    }

    .stage-label {
      font-size: 14px;
      font-weight: 500;
      line-height: 1.3;
    }

    .timeline-stage[data-status="complete"] .stage-label {
      color: #5a8c5e;
    }

    .timeline-stage[data-status="current"] .stage-label {
      color: #3a6496;
      font-weight: 600;
    }

    .timeline-stage[data-status="upcoming"] .stage-label {
      color: #6e6b65;
    }

    .stage-date {
      font-size: 12px;
      color: #a8a39c;
      margin-top: 1px;
    }

    .stage-desc {
      font-size: 13px;
      color: #6e6b65;
      margin-top: 4px;
      line-height: 1.45;
    }

    /* ── Checklist ── */
    .checklist {
      display: flex;
      flex-direction: column;
      gap: 14px;
    }

    .checklist-item {
      display: flex;
      gap: 12px;
      align-items: flex-start;
    }

    .checklist-item input[type="checkbox"] {
      width: 16px;
      height: 16px;
      flex-shrink: 0;
      margin-top: 2px;
      accent-color: #5a8c5e;
      cursor: default;
    }

    .checklist-content {
      flex: 1;
    }

    .checklist-label {
      font-size: 14px;
      font-weight: 500;
      line-height: 1.3;
    }

    .checklist-item.done .checklist-label {
      color: #a8a39c;
      text-decoration: line-through;
      text-decoration-color: #c8c4be;
      font-weight: 400;
    }

    .checklist-desc {
      font-size: 13px;
      color: #a8a39c;
      margin-top: 2px;
      line-height: 1.45;
    }

    .checklist-item:not(.done) .checklist-desc {
      color: #6e6b65;
    }

    /* ── Choices ── */
    .choices-card {
      background: #fff;
      border: 1px solid #e0ddd9;
      border-radius: 6px;
      padding: 16px;
      margin-top: 10px;
    }

    .choices-question {
      font-size: 0.9375rem;
      font-weight: 500;
      color: #1c1b18;
      margin-bottom: 14px;
      line-height: 1.4;
    }

    .choices-options {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .choice-btn {
      display: block;
      width: 100%;
      padding: 10px 14px;
      text-align: left;
      font-family: inherit;
      font-size: 0.9rem;
      color: #3a3733;
      background: #faf9f7;
      border: 1px solid #c8c4be;
      border-radius: 6px;
      cursor: pointer;
      transition: background 0.1s, border-color 0.1s;
    }

    .choice-btn:hover {
      background: #f0ede9;
      border-color: #a8a39c;
    }

    /* ── Wider viewports (768px and above) ── */
    @media (min-width: 768px) {
      body {
        display: grid;
        grid-template-columns: 1fr 320px;
        column-gap: 24px;
        align-items: start;
        max-width: 1100px;
        margin: 40px auto;
        padding: 0 16px;
      }

      #chat-col { min-width: 0; }

      #case-panel { margin-top: 0; }

      #messages {
        min-height: 320px;
        max-height: 560px;
      }

      .ui-card {
        padding: 28px 32px;
        margin-bottom: 32px;
      }

      .ui-card-title {
        margin-bottom: 24px;
      }
    }
  </style>
</head>
<body>
  <div id="chat-col">
    <h3>ATJ — local dev</h3>
    <div id="messages"></div>
    <div id="input-row">
      <input id="msg-input" type="text" placeholder="Type a message and press Enter…" autocomplete="off">
      <label id="img-label" for="img-input">Photo</label>
      <input id="img-input" type="file" accept="image/*" capture="environment">
      <button id="send-btn">Send</button>
      <button id="stop-btn" hidden>Stop</button>
    </div>
    <div id="img-preview-row" hidden>
      <img id="img-preview" alt="Selected image preview">
      <button id="img-clear-btn" type="button">✕</button>
    </div>
    <div id="status"></div>
  </div>

  <div id="case-panel">
    <div id="panel-history" class="ui-card">
      <div class="ui-card-title">Conversation history</div>
      <div id="history-search-row">
        <input id="history-search-input" type="search"
               placeholder="Search history…" autocomplete="off">
        <button id="history-search-btn">Search</button>
        <button id="history-search-clear" hidden>Clear</button>
      </div>
      <div id="panel-history-list"></div>
    </div>
    <div id="panel-documents" class="ui-card">
      <div class="ui-card-title">Documents</div>
      <div id="panel-documents-list"></div>
    </div>
  </div>

  <script>
    const USER_ID = "test_user_001";
    let sessionId = null;

    const messagesEl    = document.getElementById("messages");
    const inputEl       = document.getElementById("msg-input");
    const sendBtn       = document.getElementById("send-btn");
    const stopBtn       = document.getElementById("stop-btn");
    const statusEl      = document.getElementById("status");
    const imgInput      = document.getElementById("img-input");
    const imgPreviewRow = document.getElementById("img-preview-row");
    const imgPreview    = document.getElementById("img-preview");
    const imgClearBtn   = document.getElementById("img-clear-btn");

    // Pending image state — cleared as soon as payload is built.
    let _pendingImageData      = null;
    let _pendingImageMediaType = null;

    // Active reveal state — cleared when reveal finishes or is skipped.
    let _revealTimer = null;
    let _revealSkip  = null;

    imgInput.addEventListener("change", function () {
      const file = imgInput.files[0];
      if (!file) return;
      const reader = new FileReader();
      reader.onload = function (e) {
        // e.target.result is "data:<type>;base64,<data>" — strip the prefix.
        _pendingImageData      = e.target.result.split(",")[1];
        _pendingImageMediaType = file.type;
        imgPreview.src         = e.target.result;
        imgPreviewRow.hidden   = false;
      };
      reader.readAsDataURL(file);
    });

    imgClearBtn.addEventListener("click", clearImage);

    function clearImage() {
      _pendingImageData      = null;
      _pendingImageMediaType = null;
      imgInput.value         = "";
      imgPreview.src         = "";
      imgPreviewRow.hidden   = true;
    }

    function createTypingIndicator() {
      const turn = document.createElement("div");
      turn.className = "turn";
      const lbl = document.createElement("span");
      lbl.className = "label label-atj";
      lbl.textContent = "ATJ:";
      turn.appendChild(lbl);
      const dots = document.createElement("div");
      dots.className = "typing-indicator";
      for (let i = 0; i < 3; i++) dots.appendChild(document.createElement("span"));
      turn.appendChild(dots);
      return turn;
    }

    // Reveal `text` into `el` word by word at ~40 ms/word.
    // Calls onDone when complete. Sets _revealSkip so the stop button
    // can jump straight to the final text without cancelling onDone.
    function revealWords(el, text, onDone) {
      const words = text.split(" ");
      let idx = 0;

      function finish() {
        if (_revealTimer) { clearTimeout(_revealTimer); _revealTimer = null; }
        el.textContent = text;
        _revealSkip = null;
        onDone();
      }
      _revealSkip = finish;

      function step() {
        if (idx >= words.length) {
          el.textContent = text;
          _revealTimer = null;
          _revealSkip  = null;
          onDone();
          return;
        }
        el.textContent = words.slice(0, idx + 1).join(" ");
        idx++;
        messagesEl.scrollTop = messagesEl.scrollHeight;
        _revealTimer = setTimeout(step, 40);
      }

      step();
    }

    stopBtn.addEventListener("click", function () {
      if (_revealSkip) _revealSkip();
    });

    function appendTurn(role, text, fallback) {
      const turn = document.createElement("div");
      turn.className = "turn";

      const label = document.createElement("span");
      label.className = "label label-" + (role === "user" ? "user" : "atj");
      label.textContent = role === "user" ? "You:" : "ATJ:";
      turn.appendChild(label);

      if (fallback) {
        const tag = document.createElement("span");
        tag.className = "fallback-tag";
        tag.textContent = "[fallback]";
        turn.appendChild(tag);
      }

      const body = document.createElement("div");
      body.className = "text";
      body.textContent = text;
      turn.appendChild(body);

      messagesEl.appendChild(turn);
      messagesEl.scrollTop = messagesEl.scrollHeight;
    }

    function renderTimeline(fixture, container) {
      const card = document.createElement("div");
      card.className = "ui-card";

      const title = document.createElement("div");
      title.className = "ui-card-title";
      title.textContent = fixture.title;
      card.appendChild(title);

      const list = document.createElement("div");
      list.className = "timeline";

      fixture.stages.forEach(function(stage) {
        const row = document.createElement("div");
        row.className = "timeline-stage";
        row.dataset.status = stage.status;

        const spine = document.createElement("div");
        spine.className = "stage-spine";

        const dot = document.createElement("div");
        dot.className = "stage-dot";
        spine.appendChild(dot);
        row.appendChild(spine);

        const body = document.createElement("div");
        body.className = "stage-body";

        const label = document.createElement("div");
        label.className = "stage-label";
        label.textContent = stage.label;
        body.appendChild(label);

        if (stage.date) {
          const date = document.createElement("div");
          date.className = "stage-date";
          date.textContent = stage.date;
          body.appendChild(date);
        }

        if (stage.description) {
          const desc = document.createElement("div");
          desc.className = "stage-desc";
          desc.textContent = stage.description;
          body.appendChild(desc);
        }

        row.appendChild(body);
        list.appendChild(row);
      });

      card.appendChild(list);
      container.appendChild(card);
    }

    function renderChecklist(fixture, container) {
      const card = document.createElement("div");
      card.className = "ui-card";

      const title = document.createElement("div");
      title.className = "ui-card-title";
      title.textContent = fixture.title;
      card.appendChild(title);

      const list = document.createElement("div");
      list.className = "checklist";

      fixture.items.forEach(function(item) {
        const row = document.createElement("div");
        row.className = "checklist-item" + (item.done ? " done" : "");

        const checkbox = document.createElement("input");
        checkbox.type = "checkbox";
        checkbox.checked = item.done;
        checkbox.disabled = true;
        row.appendChild(checkbox);

        const content = document.createElement("div");
        content.className = "checklist-content";

        const label = document.createElement("div");
        label.className = "checklist-label";
        label.textContent = item.label;
        content.appendChild(label);

        if (item.description) {
          const desc = document.createElement("div");
          desc.className = "checklist-desc";
          desc.textContent = item.description;
          content.appendChild(desc);
        }

        row.appendChild(content);
        list.appendChild(row);
      });

      card.appendChild(list);
      container.appendChild(card);
    }

    function renderChoices(fixture, container) {
      const card = document.createElement("div");
      card.className = "choices-card";

      const question = document.createElement("div");
      question.className = "choices-question";
      question.textContent = fixture.question;
      card.appendChild(question);

      const options = document.createElement("div");
      options.className = "choices-options";

      fixture.options.forEach(function(option) {
        const btn = document.createElement("button");
        btn.className = "choice-btn";
        btn.textContent = option.label;
        btn.addEventListener("click", function() {
          card.querySelectorAll(".choice-btn").forEach(function(b) {
            b.disabled = true;
          });
          btn.style.fontWeight = "600";
          btn.style.borderColor = "#3a6496";
          inputEl.value = option.label;
          send();
          inputEl.value = "";
        });
        options.appendChild(btn);
      });

      card.appendChild(options);
      container.appendChild(card);
    }

    // ── Case file panel ──────────────────────────────────────────────

    function formatDate(iso) {
      const d = new Date(iso);
      const months = ["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];
      const day = d.getUTCDate();
      const mon = months[d.getUTCMonth()];
      const yr  = d.getUTCFullYear();
      const hh  = String(d.getUTCHours()).padStart(2, "0");
      const mm  = String(d.getUTCMinutes()).padStart(2, "0");
      return day + " " + mon + " " + yr + " " + hh + ":" + mm;
    }

    function renderPanelHistory(turns) {
      const list = document.getElementById("panel-history-list");
      list.innerHTML = "";
      const recent = turns.slice(-20);
      if (recent.length === 0) {
        const empty = document.createElement("div");
        empty.className = "panel-empty";
        empty.textContent = "No conversation history yet.";
        list.appendChild(empty);
        return;
      }
      recent.forEach(function(turn) {
        const row = document.createElement("div");
        row.className = "panel-turn";

        const role = document.createElement("span");
        role.className = "panel-turn-role";
        role.textContent = turn.role + ":";
        row.appendChild(role);

        const content = document.createElement("span");
        content.className = "panel-turn-content";
        content.textContent = turn.content;
        row.appendChild(content);

        list.appendChild(row);
      });
    }

    function renderPanelDocuments(docs) {
      const list = document.getElementById("panel-documents-list");
      list.innerHTML = "";
      if (docs.length === 0) {
        const empty = document.createElement("div");
        empty.className = "panel-empty";
        empty.textContent = "No documents uploaded yet.";
        list.appendChild(empty);
        return;
      }
      docs.forEach(function(doc) {
        const row = document.createElement("div");
        row.className = "panel-doc-row";

        const label = document.createElement("div");
        label.className = "panel-doc-label";
        label.textContent = doc.document_label || "Unlabelled document";
        row.appendChild(label);

        const date = document.createElement("div");
        date.className = "panel-doc-date";
        date.textContent = formatDate(doc.created_at);
        row.appendChild(date);

        list.appendChild(row);
      });
    }

    async function loadCaseFile() {
      try {
        const res = await fetch("/case-file?user_id=" + encodeURIComponent(USER_ID));
        if (!res.ok) throw new Error("HTTP " + res.status);
        const data = await res.json();
        renderPanelHistory(data.history);
        renderPanelDocuments(data.documents);
      } catch (err) {
        console.error("CASE FILE ERROR:", err);
      }
    }

    async function searchHistory() {
      const searchInput = document.getElementById("history-search-input");
      const clearBtn    = document.getElementById("history-search-clear");
      const query = searchInput.value.trim();
      if (!query) {
        loadCaseFile();
        clearBtn.hidden = true;
        return;
      }
      try {
        const res = await fetch(
          "/case-file/search?user_id=" + encodeURIComponent(USER_ID) +
          "&q=" + encodeURIComponent(query)
        );
        if (!res.ok) throw new Error("HTTP " + res.status);
        const data = await res.json();
        renderPanelHistory(data.results);
        clearBtn.hidden = false;
      } catch (err) {
        console.error("SEARCH ERROR:", err);
      }
    }

    // ── Chat send ────────────────────────────────────────────────────

    async function send() {
      const message = inputEl.value.trim();
      if (!message && !_pendingImageData) return;

      inputEl.value = "";
      sendBtn.disabled = true;
      statusEl.textContent = "Sending…";

      appendTurn("user", message || "(image)", false);

      // Show typing indicator while fetch is in flight.
      const typingEl = createTypingIndicator();
      messagesEl.appendChild(typingEl);
      messagesEl.scrollTop = messagesEl.scrollHeight;

      // Build payload and immediately clear image state — bytes are now in
      // payload only, which goes out of scope when send() returns.
      const payload = { user_id: USER_ID, message };
      if (sessionId) payload.session_id = sessionId;
      if (_pendingImageData) {
        payload.image_data       = _pendingImageData;
        payload.image_media_type = _pendingImageMediaType;
      }
      clearImage();

      try {
        const res = await fetch("/chat", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify(payload),
        });

        typingEl.remove();

        if (!res.ok) {
          appendTurn("atj", "[HTTP " + res.status + "]", false);
          statusEl.textContent = "Error " + res.status;
          sendBtn.disabled = false;
          inputEl.focus();
          return;
        }

        const data = await res.json();
        sessionId = data.session_id;

        // Build the ATJ turn container. Text is revealed word by word;
        // tool_blocks render in full immediately after the text reveal ends.
        const atjTurn = document.createElement("div");
        atjTurn.className = "turn";

        const atjLabel = document.createElement("span");
        atjLabel.className = "label label-atj";
        atjLabel.textContent = "ATJ:";
        atjTurn.appendChild(atjLabel);

        if (data.fallback_triggered) {
          const tag = document.createElement("span");
          tag.className = "fallback-tag";
          tag.textContent = "[fallback]";
          atjTurn.appendChild(tag);
        }

        messagesEl.appendChild(atjTurn);
        messagesEl.scrollTop = messagesEl.scrollHeight;

        statusEl.textContent =
          "session: " + sessionId +
          (data.fallback_triggered ? " | FALLBACK FIRED" : "");

        function afterReveal() {
          stopBtn.hidden = true;
          (data.tool_blocks || []).forEach(function(block) {
            if (!block.compliant) return;
            if (block.tool_name === "render_timeline") {
              renderTimeline(block.tool_input, atjTurn);
            } else if (block.tool_name === "render_checklist") {
              renderChecklist(block.tool_input, atjTurn);
            } else if (block.tool_name === "render_choices") {
              renderChoices(block.tool_input, atjTurn);
            }
          });
          if (data.sources && data.sources.length > 0) {
            const srcLine = document.createElement("div");
            srcLine.className = "sources-line";
            srcLine.textContent = "Based on: " + data.sources.join(", ");
            atjTurn.appendChild(srcLine);
          }
          messagesEl.scrollTop = messagesEl.scrollHeight;
          sendBtn.disabled = false;
          inputEl.focus();
          loadCaseFile();
        }

        if (data.response) {
          const textBody = document.createElement("div");
          textBody.className = "text";
          atjTurn.appendChild(textBody);
          stopBtn.hidden = false;
          revealWords(textBody, data.response, afterReveal);
        } else {
          afterReveal();
        }

      } catch (err) {
        typingEl.remove();
        appendTurn("atj", "[error: " + err.message + "]", false);
        statusEl.textContent = "Request failed";
        sendBtn.disabled = false;
        inputEl.focus();
      }
    }

    sendBtn.addEventListener("click", send);
    inputEl.addEventListener("keydown", function(e) {
      if (e.key === "Enter" && !e.shiftKey) send();
    });

    inputEl.focus();
    loadCaseFile();

    document.getElementById("history-search-btn").addEventListener("click", searchHistory);
    document.getElementById("history-search-input").addEventListener("keydown", function(e) {
      if (e.key === "Enter") searchHistory();
    });
    document.getElementById("history-search-clear").addEventListener("click", function() {
      document.getElementById("history-search-input").value = "";
      document.getElementById("history-search-clear").hidden = true;
      loadCaseFile();
    });
  </script>
</body>
</html>
