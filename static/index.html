<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="theme-color" content="#F0F1F7">
<title>Hiro</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Source+Serif+4:ital,opsz,wght@0,8..60,300;0,8..60,400;0,8..60,600;1,8..60,300;1,8..60,400;1,8..60,600&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
<style>
/* ── Tokens ── */
:root {
  --bg:             #F0F1F7;
  --sidebar-bg:     #E2E4EE;
  --surface:        #FFFFFF;
  --accent:         #4F46E5;
  --accent-hover:   #4338CA;
  --copy:           #1E2140;
  --copy-secondary: #7B7FA8;
  --copy-muted:     #A0A4C0;
  --sidebar-hover:  #D4D7E8;
  --sidebar-active: #B8BDD6;
  --border:         #D4D7E8;
  --user-bubble:    #D4D7E8;
  --input-bg:       #FFFFFF;
  --card:           #2E2825;
  --sage:           #8A9B7A;
  --red:            #c0392b;
}

/* ── Reset ── */
*, *::before, *::after {
  box-sizing: border-box;
  margin: 0; padding: 0;
  -webkit-tap-highlight-color: transparent;
}
html, body { height: 100dvh; overflow: hidden; }
body {
  font-family: 'Inter', sans-serif;
  background: var(--bg);
  color: var(--copy);
}
button { font-family: inherit; cursor: pointer; border: none; background: none; outline: none; }
input, textarea { font-family: inherit; outline: none; border: none; background: none; }

/* ── App shell ── */
#app { display: flex; flex-direction: column; height: 100dvh; }

/* ── App header (mobile) ── */
#app-header {
  position: sticky; top: 0; z-index: 100;
  display: flex; align-items: center; justify-content: space-between;
  height: 48px; padding: 0 16px;
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
}
#hiro-wordmark {
  font-family: 'Source Serif 4', serif;
  font-size: 20px; font-weight: 400; color: var(--copy);
  padding: 0 8px;
}
#header-right { display: flex; align-items: center; gap: 8px; }

.icon-btn {
  width: 36px; height: 36px; border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  background: transparent; border: none; cursor: pointer;
  transition: background 120ms;
}
.icon-btn:hover  { background: var(--sidebar-hover); }
.icon-btn:active { transform: scale(0.93); }
.icon-btn .material-icons { font-size: 22px; color: var(--copy); }

/* ── Segment strip (mobile only) ── */
#segment-strip {
  position: sticky; z-index: 99;
  display: flex;
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
}
.seg-tab {
  flex: 1; height: 36px;
  display: flex; align-items: center; justify-content: center;
  font-family: 'Inter', sans-serif;
  font-size: 10px; font-weight: 500; letter-spacing: 0.3px;
  text-transform: uppercase; color: var(--copy-secondary);
  border-bottom: 2px solid transparent;
  transition: color 150ms, border-color 150ms;
  cursor: pointer;
}
.seg-tab.active { color: var(--accent); border-bottom-color: var(--accent); }

/* ── Main body ── */
#main-body { display: flex; flex: 1; overflow: hidden; position: relative; }

/* ── Sidebar (desktop only) ── */
#sidebar { display: none; }

/* ── Chat view ── */
#chat-view {
  display: flex; flex-direction: column;
  flex: 1; min-width: 0; overflow: hidden;
  background: var(--bg);
}

/* CHANGE 1 — centre column wrapper */
#centre-col {
  display: flex; flex-direction: column;
  flex: 1; min-height: 0;
  position: relative;
  width: 100%;
}

/* ── Conversation ── */
#conversation {
  flex: 1; overflow-y: auto;
  background: var(--bg);
  padding: 24px 24px 16px;
  display: flex; flex-direction: column; gap: 24px;
  -webkit-overflow-scrolling: touch;
}

/* ── Empty state ── */
#conversation.empty { align-items: center; justify-content: center; }
#empty-state {
  font-family: 'Source Serif 4', serif;
  font-size: 28px; font-weight: 400; color: var(--copy);
  text-align: center; pointer-events: none;
}

/* ── ATJ turns ── */
.atj-turn { display: flex; flex-direction: column; animation: msg-in 200ms ease-out both; }

.atj-text {
  font-family: 'Source Serif 4', serif;
  font-size: 16px; line-height: 1.7; color: var(--copy);
  white-space: pre-wrap;
}
.fallback-note { font-size: 10px; color: var(--red); margin-top: 4px; }

/* ── User turns ── */
.user-turn { display: flex; justify-content: flex-end; }
.user-bubble {
  background: var(--user-bubble);
  border-radius: 18px 18px 4px 18px;
  padding: 10px 14px; max-width: 70%;
  font-family: 'Inter', sans-serif;
  font-size: 15px; font-weight: 500; color: var(--copy);
  line-height: 1.5; white-space: pre-wrap;
}

/* ── Thinking indicator ── */
.thinking-row { display: flex; align-items: center; gap: 8px; padding: 4px 0; }
.thinking-dot {
  width: 16px; height: 16px; border-radius: 50%; background: var(--accent);
  animation: breathe 1.5s ease-in-out infinite; flex-shrink: 0;
}
.thinking-label {
  font-family: 'Inter', sans-serif;
  font-size: 10px; font-weight: 400; color: var(--copy-muted);
}
@keyframes breathe {
  0%, 100% { opacity: 0.25; transform: scale(0.85); }
  50%       { opacity: 1;    transform: scale(1);    }
}

/* ── Session divider ── */
.session-divider {
  display: flex; align-items: center; gap: 10px;
  opacity: 0;
  animation: dividerFadeIn 300ms ease-out 200ms forwards;
}
@keyframes dividerFadeIn { from { opacity: 0; } to { opacity: 1; } }
.divider-line { flex: 1; height: 1px; background: rgba(164,168,192,0.4); }
.divider-badge {
  background: rgba(164,168,192,0.15); border-radius: 999px;
  padding: 3px 10px;
  font-family: 'Inter', sans-serif;
  font-weight: 600; font-size: 8px;
  color: var(--copy-secondary); letter-spacing: 0.5px;
  animation: badgeScale 300ms ease-out 200ms both;
  transform-origin: center;
}
@keyframes badgeScale { from { transform: scale(0.9); } to { transform: scale(1); } }

/* ── Chips ── */
.chips-row { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 10px; }
.chip {
  display: inline-flex; align-items: center; gap: 4px;
  background: var(--sidebar-hover); border: 1px solid var(--border); border-radius: 999px;
  padding: 5px 12px;
  font-family: 'Inter', sans-serif; font-size: 10px; font-weight: 500; color: var(--copy);
  cursor: pointer; transition: background 100ms;
  animation: chip-in 150ms ease-out both;
}
.chip .material-icons { font-size: 11px; }
.chip:hover  { background: var(--sidebar-active); }
.chip:active { transform: scale(0.96); }
.chip.used   { opacity: 0.5; pointer-events: none; }

/* ── Sources ── */
.sources-line { font-size: 9px; color: var(--copy-muted); margin-top: 8px; line-height: 1.5; }

/* ── Dark cards ── */
.dark-card {
  background: var(--card); border-radius: 20px; padding: 15px 17px;
  margin-top: 10px; animation: card-in 200ms ease-out both;
}
.dark-card-title {
  font-family: 'Inter', sans-serif;
  font-size: 9px; font-weight: 700; text-transform: uppercase;
  letter-spacing: 0.8px; color: rgba(255,255,255,0.5); margin-bottom: 14px;
}
.card-source { font-size: 9px; color: rgba(255,255,255,0.25); margin-top: 12px; font-family: 'Inter', sans-serif; }

/* Timeline */
.tl-stages { display: flex; flex-direction: column; }
.tl-row    { display: flex; gap: 10px; }
.tl-spine  { display: flex; flex-direction: column; align-items: center; flex-shrink: 0; width: 14px; }
.tl-dot    { border-radius: 50%; flex-shrink: 0; }
.tl-dot.complete { width: 10px; height: 10px; background: var(--sage); margin-top: 3px; }
.tl-dot.current  { width: 12px; height: 12px; background: var(--accent); box-shadow: 0 0 0 3px rgba(79,70,229,0.25); margin-top: 2px; }
.tl-dot.upcoming { width: 10px; height: 10px; background: transparent; border: 2px solid rgba(255,255,255,0.2); margin-top: 3px; }
.tl-line   { width: 1.5px; background: rgba(255,255,255,0.12); flex: 1; margin: 2px auto 0; min-height: 12px; }
.tl-content { flex: 1; padding-bottom: 14px; }
.tl-stage   { font-family: 'Inter', sans-serif; font-size: 11px; line-height: 1.4; }
.tl-stage.complete { color: rgba(255,255,255,0.4); font-weight: 400; }
.tl-stage.current  { color: #fff; font-weight: 700; }
.tl-stage.upcoming { color: rgba(255,255,255,0.25); font-weight: 400; }
.tl-meta { font-family: 'Inter', sans-serif; font-size: 9px; color: rgba(255,255,255,0.3); margin-top: 2px; }

/* Checklist */
.cl-items { display: flex; flex-direction: column; }
.cl-row   { display: flex; align-items: flex-start; gap: 10px; padding: 5px 0; }
.cl-circle {
  width: 16px; height: 16px; border-radius: 50%; flex-shrink: 0; margin-top: 1px;
  display: flex; align-items: center; justify-content: center;
}
.cl-circle.done { background: var(--sage); }
.cl-circle.done .material-icons { font-size: 10px; color: #fff; }
.cl-circle.todo { background: transparent; border: 2px solid rgba(255,255,255,0.2); }
.cl-label { font-family: 'Inter', sans-serif; font-size: 11px; line-height: 1.4; }
.cl-label.done { color: rgba(255,255,255,0.4); text-decoration: line-through; text-decoration-color: rgba(255,255,255,0.2); font-weight: 400; }
.cl-label.todo { color: #fff; font-weight: 500; }
.cl-desc  { font-family: 'Inter', sans-serif; font-size: 9px; color: rgba(255,255,255,0.35); margin-top: 2px; }

/* Choices */
.choices-wrap { margin-top: 10px; display: flex; flex-direction: column; gap: 8px; }
.choices-question {
  font-family: 'Source Serif 4', serif;
  font-size: 16px; color: var(--copy); line-height: 1.5;
}
.choice-chip {
  display: block; width: 100%; padding: 14px 16px; text-align: left;
  border: 1px solid var(--border); background: var(--surface);
  border-radius: 8px;
  font-family: 'Inter', sans-serif;
  font-size: 15px; font-weight: 400; color: var(--copy);
  cursor: pointer; transition: background 150ms;
  animation: chip-in 150ms ease-out both;
}
.choice-chip:hover  { background: var(--sidebar-hover); }
.choice-chip:active { transform: scale(0.97); }
.choice-chip.used   { opacity: 0.5; pointer-events: none; }
.choice-chip:last-child { background: var(--sidebar-active); border: none; }

#sidebar-logo { display: none; }

/* ── Scroll arrow — centred, outline ── */
#scroll-arrow {
  position: absolute; bottom: 80px; left: 50%;
  transform: translateX(-50%) translateY(8px);
  width: 32px; height: 32px; border-radius: 50%;
  background: transparent; border: 2px solid var(--accent);
  display: flex; align-items: center; justify-content: center;
  z-index: 5;
  opacity: 0; pointer-events: none;
  transition: opacity 200ms, transform 200ms;
  cursor: pointer;
}
#scroll-arrow.visible { opacity: 1; transform: translateX(-50%) translateY(0); pointer-events: auto; }
#scroll-arrow .material-icons { font-size: 18px; color: var(--accent); }

/* ── Input bar ── */
#input-bar {
  flex-shrink: 0; background: var(--bg);
  border-top: none;
  padding: 10px 14px 12px;
  position: relative; z-index: 100;
}
#img-preview-row { display: flex; align-items: center; gap: 8px; margin-bottom: 8px; }
#img-preview-row[hidden] { display: none; }
#img-preview { width: 44px; height: 44px; object-fit: cover; border-radius: 8px; border: 1px solid var(--border); }
#img-clear-btn { font-size: 11px; color: var(--copy-muted); padding: 4px 6px; cursor: pointer; }
#img-clear-btn:hover { color: var(--copy); }

#input-row {
  display: flex; align-items: center; gap: 8px;
  background: var(--surface); border: 1px solid var(--border); border-radius: 10px;
  padding: 6px 6px 6px 8px;
}

#plus-btn {
  width: 34px; height: 34px; border-radius: 50%;
  border: none; background: transparent;
  display: flex; align-items: center; justify-content: center; flex-shrink: 0;
  transition: background 120ms; cursor: pointer;
}
#plus-btn:hover  { background: var(--sidebar-hover); }
#plus-btn:active { transform: scale(0.93); }
#plus-btn .material-icons { font-size: 20px; color: var(--copy-secondary); }

#msg-input {
  flex: 1; min-width: 0; background: transparent;
  border: none;
  padding: 9px 12px; font-size: 15px; color: var(--copy); line-height: 1.4;
  resize: none; min-height: 38px; max-height: 120px;
  overflow-y: auto; -webkit-overflow-scrolling: touch;
}
#msg-input::placeholder { color: var(--copy-secondary); }
#msg-input:focus { outline: none; }

#send-btn {
  width: 36px; height: 36px; border-radius: 50%; border: none;
  background: var(--accent);
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0; transition: background 150ms; cursor: pointer;
}
#send-btn:hover  { background: var(--accent-hover); }
#send-btn.active { background: var(--accent); }
#send-btn:active { transform: scale(0.93); }
#send-btn .material-icons { font-size: 18px; color: #fff; }

/* ── Action tray ── */
#action-tray {
  position: absolute; bottom: 100%; left: 0; right: 0;
  background: var(--surface);
  border: 1px solid var(--border); border-bottom: none;
  border-radius: 8px 8px 0 0;
  z-index: 99; padding: 8px 14px;
  transform: translateY(8px); opacity: 0; pointer-events: none;
  transition: transform 180ms ease-out, opacity 180ms ease-out;
}
#action-tray.open { transform: translateY(0); opacity: 1; pointer-events: auto; }
.tray-item {
  display: flex; align-items: center; gap: 10px;
  padding: 10px 8px; border-radius: 8px; cursor: pointer; transition: background 100ms;
}
.tray-item:hover { background: var(--sidebar-hover); }
.tray-icon {
  width: 38px; height: 38px; border-radius: 10px; background: var(--sidebar-hover);
  display: flex; align-items: center; justify-content: center; flex-shrink: 0;
}
.tray-icon .material-icons { font-size: 18px; color: var(--copy-secondary); }
.tray-label { font-family: 'Inter', sans-serif; font-size: 15px; font-weight: 400; color: var(--copy); }

/* ── Mobile case view ── */
#case-view {
  flex: 1; overflow-y: auto; background: var(--bg);
  padding: 16px; display: none; flex-direction: column; gap: 6px;
  -webkit-overflow-scrolling: touch;
}
#case-view.visible { display: flex; }

.panel-section { background: var(--surface); border-radius: 12px; padding: 16px; }
.panel-section-title {
  font-family: 'Inter', sans-serif;
  font-size: 11px; font-weight: 600; text-transform: uppercase;
  letter-spacing: 0.05em; color: var(--copy-secondary); margin-bottom: 10px;
}
.panel-search-row { display: flex; gap: 8px; margin-bottom: 12px; }
.panel-search-input {
  flex: 1; min-width: 0; background: var(--sidebar-hover); border: 1px solid var(--border);
  border-radius: 999px; padding: 8px 14px; font-size: 15px; color: var(--copy);
  transition: border-color 120ms;
}
.panel-search-input:focus { border-color: var(--accent); outline: none; }
.panel-search-input::placeholder { color: var(--copy-muted); }
.panel-search-btn {
  width: 36px; height: 36px; border-radius: 50%; background: var(--accent); border: none;
  display: flex; align-items: center; justify-content: center; flex-shrink: 0; cursor: pointer;
}
.panel-search-btn .material-icons { font-size: 16px; color: #fff; }
.panel-search-btn:hover { background: var(--accent-hover); }
.panel-search-btn:active { transform: scale(0.93); }
.panel-row {
  display: flex; align-items: flex-start; justify-content: space-between;
  padding: 10px 0; border-top: 1px solid rgba(164,168,192,0.2);
  cursor: default; transition: background 100ms;
}
.panel-row:first-of-type { border-top: none; }
.panel-row:hover { background: var(--sidebar-hover); }
.panel-row-title { font-family: 'Inter', sans-serif; font-size: 13px; font-weight: 500; color: var(--copy); }
.panel-row-meta  { font-family: 'Inter', sans-serif; font-size: 11px; font-weight: 400; color: var(--copy-muted); margin-top: 2px; }
.panel-empty { font-family: 'Inter', sans-serif; font-size: 13px; font-weight: 400; color: var(--copy-secondary); padding: 8px 0; }

/* ── Settings overlay ── */
#settings-overlay {
  position: fixed; inset: 0; z-index: 200;
  background: rgba(30,33,64,0.4);
}
#settings-overlay[hidden] { display: none; }
#settings-sheet {
  position: absolute; bottom: 0; left: 0; right: 0;
  background: var(--surface); border-radius: 20px 20px 0 0;
  max-height: 80dvh; overflow-y: auto; -webkit-overflow-scrolling: touch;
  padding: 0 0 32px;
  animation: sheet-up 280ms cubic-bezier(0.32, 0.72, 0, 1) both;
}
@keyframes sheet-up { from { transform: translateY(100%); } to { transform: translateY(0); } }
@keyframes modal-in {
  from { opacity: 0; transform: translate(-50%, calc(-50% + 10px)); }
  to   { opacity: 1; transform: translate(-50%, -50%); }
}
.sheet-handle {
  width: 36px; height: 4px; background: rgba(164,168,192,0.4); border-radius: 2px;
  margin: 12px auto 20px;
}
.sheet-section {
  background: var(--surface); border-radius: 12px;
  padding: 4px 16px; margin: 0 16px 6px;
}
.sheet-section-label {
  font-family: 'Inter', sans-serif;
  font-size: 11px; font-weight: 600; text-transform: uppercase;
  letter-spacing: 0.05em; color: var(--copy-secondary); padding: 12px 0 6px;
}
.sheet-row {
  display: flex; align-items: center; justify-content: space-between;
  padding: 10px 12px; margin: 4px 0; border-radius: 8px;
  background: var(--sidebar-hover);
  transition: background 100ms; cursor: default;
}
.sheet-row:hover { background: var(--sidebar-active); }
.sheet-row-key  { font-family: 'Inter', sans-serif; font-size: 15px; font-weight: 400; color: var(--copy); }
.sheet-row-val  { font-family: 'Inter', sans-serif; font-size: 13px; font-weight: 400; color: var(--copy-secondary); }
.trial-badge {
  font-family: 'Inter', sans-serif; font-weight: 600; font-size: 13px;
  color: var(--accent); background: none;
}
.sheet-sign-out {
  font-family: 'Inter', sans-serif; font-size: 15px; font-weight: 500; color: #fff;
  background: var(--accent); border-radius: 8px;
  text-align: center; width: 100%; padding: 12px 16px; display: block; cursor: pointer;
  transition: background 150ms;
}
.sheet-sign-out:hover { background: var(--accent-hover); }

/* ── Keyframes ── */
@keyframes msg-in   { from { opacity: 0; } to { opacity: 1; } }
@keyframes card-in  { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: translateY(0); } }
@keyframes chip-in  { from { opacity: 0; transform: translateY(4px); } to { opacity: 1; transform: translateY(0); } }

/* ── Desktop (768px+) ── */
@media (min-width: 768px) {
  #segment-strip { display: none; }
  #case-view     { display: none !important; }

  /* Header: wordmark + settings row, fixed at bottom of sidebar */
  #app-header {
    position: fixed; bottom: 0; left: 0;
    width: 220px; height: auto;
    background: var(--sidebar-bg);
    border: none;
    padding: 8px;
    z-index: 150;
    flex-direction: column;
    align-items: flex-start;
    justify-content: flex-end;
  }
  #hiro-wordmark { display: none; }
  #header-right { width: 100%; padding: 0; display: flex; flex-direction: column; align-items: flex-start; gap: 0; }
  #sidebar-logo { display: block; width: 48px; height: auto; opacity: 0.5; padding-left: 8px; margin-bottom: 16px; }
  #settings-btn {
    width: 100%; height: 36px; border-radius: 6px;
    background: none; display: flex; align-items: center;
    gap: 10px; padding: 0 8px;
    font-family: 'Inter', sans-serif; font-size: 13px; font-weight: 400;
    color: var(--copy); justify-content: flex-start;
  }
  #settings-btn:hover { background: var(--sidebar-hover); }
  #settings-btn:active { background: var(--sidebar-active); transform: none; }
  #settings-btn .material-icons { font-size: 18px; color: var(--copy); flex-shrink: 0; }
  #settings-btn::after { content: "Settings"; }

  /* Centre column fixed 720px */
  #centre-col { max-width: 720px; margin: 0 auto; }

  /* Sidebar */
  #sidebar {
    display: flex; flex-direction: column;
    width: 220px; flex-shrink: 0; background: var(--sidebar-bg);
    border-right: none;
    overflow-y: auto; -webkit-overflow-scrolling: touch;
    padding: 12px 0 96px;
  }
  #new-conv-row {
    display: flex; align-items: center; gap: 10px;
    padding: 8px 16px; margin: 1px 8px;
    cursor: pointer; transition: background 100ms; border-radius: 6px;
    font-family: 'Inter', sans-serif; font-size: 13px; font-weight: 400; color: var(--copy);
  }
  #new-conv-row:hover { background: var(--sidebar-hover); }
  #new-conv-row .material-icons { font-size: 16px; color: var(--copy); }

  .sidebar-section-label {
    font-family: 'Inter', sans-serif;
    font-size: 11px; font-weight: 600; text-transform: uppercase;
    letter-spacing: 0.05em; color: var(--copy-secondary); padding: 12px 16px 4px;
  }
  .conv-item {
    padding: 8px 16px; margin: 1px 8px;
    font-family: 'Inter', sans-serif; font-size: 13px; font-weight: 400; color: var(--copy);
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    cursor: pointer; border-radius: 6px; transition: background 100ms;
  }
  .conv-item:hover  { background: var(--sidebar-hover); }
  .conv-item.active { background: var(--sidebar-active); font-weight: 500; color: var(--copy); }
  .conv-item:active { transform: scale(0.98); }

  .sidebar-search {
    display: block;
    width: calc(100% - 32px); margin: 0 16px 4px;
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 6px; padding: 6px 12px;
    font-family: 'Inter', sans-serif; font-size: 13px; color: var(--copy);
    transition: border-color 120ms;
  }
  .sidebar-search::placeholder { color: var(--copy-muted); }
  .sidebar-search:focus { border-color: var(--accent); outline: none; }
  .sidebar-doc-row {
    padding: 6px 16px; margin: 1px 8px; border-radius: 6px;
    cursor: default; transition: background 100ms;
  }
  .sidebar-doc-row:hover { background: var(--sidebar-hover); }
  .sidebar-doc-title {
    font-family: 'Inter', sans-serif; font-size: 13px; font-weight: 500; color: var(--copy);
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }
  .sidebar-doc-meta {
    font-family: 'Inter', sans-serif; font-size: 11px; color: var(--copy-secondary);
  }
  .sidebar-empty {
    font-family: 'Inter', sans-serif; font-size: 13px; font-weight: 400;
    color: var(--copy-secondary); padding: 4px 16px 8px;
  }

  /* Conversation */
  #conversation { padding: 40px 0 16px; }
  .atj-text { font-size: 16px; }
  .user-bubble { font-size: 15px; }

  /* Input bar: transparent, no container — sits on page bg */
  #input-bar { background: transparent; border-top: none; padding: 12px 0 16px; }
  #input-row {
    background: transparent; border: none;
    border-radius: 0; padding: 4px 0; gap: 6px; align-items: center;
  }
  #plus-btn { width: 28px; height: 28px; }
  #plus-btn .material-icons { font-size: 16px; }
  #msg-input {
    background: transparent; border: none;
    padding: 2px 6px; font-size: 15px; resize: none;
    min-height: auto; max-height: 80px;
  }
  #msg-input:focus { outline: none; }
  #send-btn { width: 36px; height: 36px; }
  #send-btn .material-icons { font-size: 18px; }

  /* Action tray */
  #action-tray {
    border: 1px solid var(--border); border-bottom: none;
    border-radius: 10px 10px 0 0;
    box-shadow: 0 -4px 16px rgba(0,0,0,0.06);
  }

  /* Settings: centred modal */
  .sheet-handle { display: none; }
  #settings-sheet {
    position: fixed; top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    width: 480px; max-width: 90vw;
    border-radius: 12px;
    bottom: auto; padding: 24px;
    animation: modal-in 220ms ease-out both;
    max-height: 80dvh;
  }
}
</style>
</head>
<body>

<div id="app">

  <!-- Header -->
  <header id="app-header">
    <span id="hiro-wordmark">Hiro</span>
    <div id="header-right">
      <img src="/static/hiro-wordmark.png" alt="Hiro" id="sidebar-logo">
      <button id="settings-btn" class="icon-btn" title="Settings">
        <span class="material-icons">settings</span>
      </button>
    </div>
  </header>

  <!-- Segment strip (mobile) -->
  <div id="segment-strip">
    <button class="seg-tab active" id="tab-chat">Chat</button>
    <button class="seg-tab" id="tab-case">Case file</button>
  </div>

  <!-- Main body -->
  <div id="main-body">

    <!-- CHANGE 4 — desktop sidebar: 3 sections -->
    <aside id="sidebar">
      <div id="new-conv-row">
        <span class="material-icons">edit</span>
        <span>New conversation</span>
      </div>
      <div class="sidebar-section-label">Recent</div>
      <div id="conv-list"></div>
      <div class="sidebar-section-label">Case file</div>

        <!-- scroll arrow inside centre-col so it aligns with column on desktop -->

        <div id="input-bar">
          <!-- Action tray -->

          <button class="panel-search-btn" id="mobile-search-btn">
            <span class="material-icons">search</span>

<!-- Settings overlay — CHANGE 7 -->
<div id="settings-overlay" hidden>
  <div id="settings-sheet">
    <div class="sheet-handle"></div>
    <div class="sheet-section">
      <div class="sheet-section-label">Account</div>
      <div class="sheet-row">
        <span class="sheet-row-key">Plan</span>
        <span class="trial-badge">Trial</span>
      </div>

<!-- Hidden file inputs -->
<input type="file" id="img-input"  accept="image/*" capture="environment" style="position:absolute;visibility:hidden;width:0;height:0;">
<input type="file" id="file-input" accept=".pdf,.doc,.docx,.txt,.png,.jpg,.jpeg" style="position:absolute;visibility:hidden;width:0;height:0;">
<button id="stop-btn" hidden></button>

<script>
// ── State ──────────────────────────────────────────────────
const USER_ID = "test_user_001";
let sessionId   = null;
let _trayOpen   = false;
let _pendingImageData      = null;
let _pendingImageMediaType = null;
let _revealTimer = null;
let _revealSkip  = null;
let _caseFileCache = null; // last fetched {history, documents}

// ── Element refs ───────────────────────────────────────────
const convEl          = document.getElementById("conversation");
const inputEl         = document.getElementById("msg-input");
const sendBtn         = document.getElementById("send-btn");
const stopBtn         = document.getElementById("stop-btn");
const plusBtn         = document.getElementById("plus-btn");
const actionTray      = document.getElementById("action-tray");
const imgInput        = document.getElementById("img-input");
const fileInput       = document.getElementById("file-input");
const imgPreviewRow   = document.getElementById("img-preview-row");
const imgPreview      = document.getElementById("img-preview");
const imgClearBtn     = document.getElementById("img-clear-btn");
const scrollArrow     = document.getElementById("scroll-arrow");
const settingsBtn     = document.getElementById("settings-btn");
const settingsOverlay = document.getElementById("settings-overlay");
const chatView        = document.getElementById("chat-view");
const caseView        = document.getElementById("case-view");
const tabChat         = document.getElementById("tab-chat");
const tabCase         = document.getElementById("tab-case");

// ── Textarea auto-grow ─────────────────────────────────────
inputEl.addEventListener("input", function() {
  this.style.height = "auto";
  this.style.height = Math.min(this.scrollHeight, 120) + "px";
  syncSendBtn();
});

// ── Send button sync ───────────────────────────────────────
function syncSendBtn() {
  const active = inputEl.value.trim().length > 0 || !!_pendingImageData;
  sendBtn.classList.toggle("active", active);
}

// ── Plus / action tray ─────────────────────────────────────
plusBtn.addEventListener("click", function(e) {
  e.stopPropagation();
  _trayOpen = !_trayOpen;
  actionTray.classList.toggle("open", _trayOpen);
});
document.addEventListener("click", function(e) {
  if (_trayOpen && !actionTray.contains(e.target) && e.target !== plusBtn) {
    _trayOpen = false; actionTray.classList.remove("open");
  }
});
document.getElementById("tray-photo").addEventListener("click", function() {
  imgInput.setAttribute("capture", "environment"); imgInput.click();
  _trayOpen = false; actionTray.classList.remove("open");
});
document.getElementById("tray-file").addEventListener("click", function() {
  fileInput.click(); _trayOpen = false; actionTray.classList.remove("open");
});

// ── Image / file upload ────────────────────────────────────
imgInput.addEventListener("change", function() {
  const file = imgInput.files[0]; if (!file) return;
  readAsImage(file);
});
fileInput.addEventListener("change", function() {
  const file = fileInput.files[0]; if (!file) return;
  if (file.type.startsWith("image/")) {
    readAsImage(file);
  } else {
    inputEl.value = "Uploaded: " + file.name;
    syncSendBtn();
  }
});
function readAsImage(file) {
  const reader = new FileReader();
  reader.onload = function(e) {
    _pendingImageData      = e.target.result.split(",")[1];
    _pendingImageMediaType = file.type;
    imgPreview.src         = e.target.result;
    imgPreviewRow.hidden   = false;
    syncSendBtn();
  };
  reader.readAsDataURL(file);
}
imgClearBtn.addEventListener("click", clearImage);
function clearImage() {
  _pendingImageData = null; _pendingImageMediaType = null;
  imgInput.value = ""; fileInput.value = "";
  imgPreview.src = ""; imgPreviewRow.hidden = true;
  inputEl.placeholder = "Write a message...";
  syncSendBtn();
}

// ── Scroll arrow ───────────────────────────────────────────
convEl.addEventListener("scroll", function() {
  const gap = convEl.scrollHeight - convEl.scrollTop - convEl.clientHeight;
  scrollArrow.classList.toggle("visible", gap > 40);
});
scrollArrow.addEventListener("click", function() {
  convEl.scrollTo({ top: convEl.scrollHeight, behavior: "smooth" });
});

// ── Settings ───────────────────────────────────────────────
settingsBtn.addEventListener("click", function() { settingsOverlay.hidden = false; });
settingsOverlay.addEventListener("click", function(e) {
  if (e.target === settingsOverlay) settingsOverlay.hidden = true;
});
document.getElementById("delete-data-row").addEventListener("click", function() {
  if (confirm("Delete all your data? This cannot be undone.")) {
    alert("Data deletion not available in local dev mode.");
  }
});
document.getElementById("sign-out-btn").addEventListener("click", function() {
  settingsOverlay.hidden = true;
});

// ── Mobile tabs ────────────────────────────────────────────
tabChat.addEventListener("click", function() {
  tabChat.classList.add("active"); tabCase.classList.remove("active");
  chatView.style.display = ""; caseView.classList.remove("visible");
});
tabCase.addEventListener("click", function() {
  tabCase.classList.add("active"); tabChat.classList.remove("active");
  chatView.style.display = "none"; caseView.classList.add("visible");
  loadCaseFile();
});

// ── Empty state ────────────────────────────────────────────
function showEmptyState() {
  convEl.innerHTML = "";
  const es = document.createElement("div"); es.id = "empty-state";
  es.textContent = "Where would you like to start?";
  convEl.appendChild(es);
  convEl.classList.add("empty");
}
function hideEmptyState() {
  convEl.classList.remove("empty");
  const es = document.getElementById("empty-state");
  if (es) es.remove();
}

// ── New conversation ───────────────────────────────────────
document.getElementById("new-conv-row").addEventListener("click", function() {
  sessionId = (window.crypto && crypto.randomUUID)
    ? crypto.randomUUID()
    : "sess-" + Date.now();
  showEmptyState();
  inputEl.value = ""; inputEl.style.height = ""; syncSendBtn();
  document.querySelectorAll(".conv-item").forEach(function(el) {
    el.classList.remove("active");
  });
  inputEl.focus();
});

// ── Load conversation from history ─────────────────────────
function loadConversation(sid, history) {
  hideEmptyState();
  sessionId = sid;
  convEl.innerHTML = "";
  document.querySelectorAll(".conv-item").forEach(function(el) {
    el.classList.toggle("active", el.dataset.sid === sid);
  });
  const turns = history.filter(function(t) { return t.session_id === sid; });
  if (!turns.length) {
    const e = document.createElement("div");
    e.style.cssText = "text-align:center;color:var(--muted);font-size:12px;padding:32px 0;font-family:'Inter',sans-serif;";
    e.textContent = "No messages found."; convEl.appendChild(e); return;
  }
  turns.forEach(function(t) {
    if (t.role === "user") {
      const uT = document.createElement("div"); uT.className = "user-turn";
      const b  = document.createElement("div"); b.className  = "user-bubble";
      b.textContent = t.content; uT.appendChild(b); convEl.appendChild(uT);
    } else {
      const aT = document.createElement("div"); aT.className = "atj-turn";
      const tb = document.createElement("div"); tb.className = "atj-text"; tb.textContent = t.content;
      aT.appendChild(tb); convEl.appendChild(aT);
    }
  });
  convEl.scrollTop = convEl.scrollHeight;
}

// ── Thinking indicator ─────────────────────────────────────
function makeThinkingEl() {
  const wrap = document.createElement("div"); wrap.className = "atj-turn";
  const row  = document.createElement("div"); row.className  = "thinking-row";
  const dot  = document.createElement("div"); dot.className  = "thinking-dot";
  const lbl  = document.createElement("span"); lbl.className = "thinking-label";
  lbl.textContent = "Hiro is thinking…";
  row.append(dot, lbl); wrap.append(row); return wrap;
}

// ── Word-by-word reveal ────────────────────────────────────
function revealWords(el, text, onDone) {
  const words = text.split(" "); let idx = 0;
  function finish() {
    if (_revealTimer) { clearTimeout(_revealTimer); _revealTimer = null; }
    el.textContent = text; _revealSkip = null; onDone();
  }
  _revealSkip = finish;
  function step() {
    if (idx >= words.length) { el.textContent = text; _revealTimer = null; _revealSkip = null; onDone(); return; }
    el.textContent = words.slice(0, idx + 1).join(" "); idx++;
    convEl.scrollTop = convEl.scrollHeight;
    _revealTimer = setTimeout(step, 40);
  }
  step();
}
stopBtn.addEventListener("click", function() { if (_revealSkip) _revealSkip(); });

// ── Render: timeline ───────────────────────────────────────
function renderTimeline(fixture, container) {
  const card = document.createElement("div"); card.className = "dark-card";
  const title = document.createElement("div"); title.className = "dark-card-title"; title.textContent = fixture.title;
  card.appendChild(title);
  const stages = document.createElement("div"); stages.className = "tl-stages";
  (fixture.stages || []).forEach(function(s, i, arr) {
    const row   = document.createElement("div"); row.className = "tl-row";
    const spine = document.createElement("div"); spine.className = "tl-spine";
    const dot   = document.createElement("div"); dot.className = "tl-dot " + s.status; spine.appendChild(dot);
    if (i < arr.length - 1) { const ln = document.createElement("div"); ln.className = "tl-line"; spine.appendChild(ln); }
    row.appendChild(spine);
    const body = document.createElement("div"); body.className = "tl-content";
    const lbl  = document.createElement("div"); lbl.className  = "tl-stage " + s.status; lbl.textContent = s.label; body.appendChild(lbl);
    if (s.description) { const desc = document.createElement("div"); desc.className = "tl-meta"; desc.textContent = s.description; body.appendChild(desc); }
    if (s.date)        { const dt   = document.createElement("div"); dt.className   = "tl-meta"; dt.textContent   = s.date;        body.appendChild(dt); }
    row.appendChild(body); stages.appendChild(row);
  });
  card.appendChild(stages);
  if (fixture._source) { const src = document.createElement("div"); src.className = "card-source"; src.textContent = "Based on: " + fixture._source; card.appendChild(src); }
  container.appendChild(card);
}

// ── Render: checklist ──────────────────────────────────────
function renderChecklist(fixture, container) {
  const card = document.createElement("div"); card.className = "dark-card";
  const title = document.createElement("div"); title.className = "dark-card-title"; title.textContent = fixture.title;
  card.appendChild(title);
  const list = document.createElement("div"); list.className = "cl-items";
  (fixture.items || []).forEach(function(item) {
    const row    = document.createElement("div"); row.className = "cl-row";
    const circle = document.createElement("div"); circle.className = "cl-circle " + (item.done ? "done" : "todo");
    if (item.done) { const ic = document.createElement("span"); ic.className = "material-icons"; ic.textContent = "check"; circle.appendChild(ic); }
    row.appendChild(circle);
    const wrap = document.createElement("div");
    const lbl  = document.createElement("div"); lbl.className = "cl-label " + (item.done ? "done" : "todo"); lbl.textContent = item.label; wrap.appendChild(lbl);
    if (item.description) { const d = document.createElement("div"); d.className = "cl-desc"; d.textContent = item.description; wrap.appendChild(d); }
    row.appendChild(wrap); list.appendChild(row);
  });
  card.appendChild(list);
  if (fixture._source) { const src = document.createElement("div"); src.className = "card-source"; src.textContent = "Based on: " + fixture._source; card.appendChild(src); }
  container.appendChild(card);
}

// ── Render: choices ────────────────────────────────────────
function renderChoices(fixture, container) {
  const wrap = document.createElement("div"); wrap.className = "choices-wrap";
  if (fixture.question) {
    const q = document.createElement("div"); q.className = "choices-question"; q.textContent = fixture.question; wrap.appendChild(q);
  }
  (fixture.options || []).forEach(function(opt, i) {
    const btn = document.createElement("button"); btn.className = "choice-chip";
    btn.textContent = opt.label; btn.style.animationDelay = (i * 60) + "ms";
    btn.addEventListener("click", function() {
      wrap.querySelectorAll(".choice-chip").forEach(function(b) { b.classList.add("used"); b.disabled = true; });
      inputEl.value = opt.label; send(); inputEl.value = "";
    });
    wrap.appendChild(btn);
  });
  container.appendChild(wrap);
}

// ── Render: suggestion chips ───────────────────────────────
function renderChips(chips, container) {
  if (!chips || !chips.length) return;
  const row = document.createElement("div"); row.className = "chips-row";
  chips.forEach(function(chip, i) {
    const el = document.createElement("button"); el.className = "chip";
    el.style.animationDelay = (i * 60) + "ms";
    if (chip.icon) { const ic = document.createElement("span"); ic.className = "material-icons"; ic.textContent = chip.icon; el.appendChild(ic); }
    el.appendChild(document.createTextNode(chip.label || chip));
    el.addEventListener("click", function() {
      row.querySelectorAll(".chip").forEach(function(c) { c.classList.add("used"); c.disabled = true; });
      const val = chip.label || chip;
      inputEl.value = val; send(); inputEl.value = "";
    });
    row.appendChild(el);
  });
  container.appendChild(row);
}

// ── Session divider ────────────────────────────────────────
function insertSessionDivider() {
  if (convEl.querySelector(".session-divider")) return;
  const div   = document.createElement("div"); div.className = "session-divider";
  const line1 = document.createElement("div"); line1.className = "divider-line";
  const badge = document.createElement("div"); badge.className = "divider-badge";
  const now   = new Date();
  badge.textContent = now.toLocaleDateString("en-GB", { day: "numeric", month: "short", year: "numeric" });
  const line2 = document.createElement("div"); line2.className = "divider-line";
  div.append(line1, badge, line2);
  convEl.appendChild(div);
}

// ── Helpers ────────────────────────────────────────────────
function fmtDate(iso) {
  const d = new Date(iso);
  const M = ["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];
  return d.getUTCDate() + " " + M[d.getUTCMonth()] + " " + d.getUTCFullYear()
    + " " + String(d.getUTCHours()).padStart(2,"0") + ":" + String(d.getUTCMinutes()).padStart(2,"0");
}

function buildPanelRows(turns, emptyText) {
  const frag = document.createDocumentFragment();
  const items = turns.slice(-20);
  if (!items.length) {
    const e = document.createElement("div"); e.className = "panel-empty";
    e.textContent = emptyText || "Your case file will build as you talk to Hiro.";
    frag.appendChild(e); return frag;
  }
  items.forEach(function(t) {
    const row   = document.createElement("div"); row.className = "panel-row";
    const left  = document.createElement("div");
    const title = document.createElement("div"); title.className = "panel-row-title";
    title.textContent = (t.role === "user" ? "You: " : "Hiro: ") + t.content;
    left.appendChild(title); row.appendChild(left);
    frag.appendChild(row);
  });
  return frag;
}

function buildDocRows(docs) {
  const frag = document.createDocumentFragment();
  if (!docs.length) {
    const e = document.createElement("div"); e.className = "panel-empty";
    e.textContent = "No documents uploaded yet."; frag.appendChild(e); return frag;
  }
  docs.forEach(function(doc) {
    const row   = document.createElement("div"); row.className = "panel-row";
    const title = document.createElement("div"); title.className = "panel-row-title";
    title.textContent = doc.document_label || "Untitled document"; row.appendChild(title);
    const meta  = document.createElement("div"); meta.className  = "panel-row-meta";
    meta.textContent = fmtDate(doc.created_at); row.appendChild(meta);
    frag.appendChild(row);
  });
  return frag;
}

// CHANGE 4 — sidebar docs
function buildSidebarDocRows(docs) {
  const frag = document.createDocumentFragment();
  if (!docs || !docs.length) {
    const e = document.createElement("div"); e.className = "sidebar-empty";
    e.textContent = "No documents yet."; frag.appendChild(e); return frag;
  }
  docs.forEach(function(doc) {
    const row   = document.createElement("div"); row.className = "sidebar-doc-row";
    const title = document.createElement("div"); title.className = "sidebar-doc-title";
    title.textContent = doc.document_label || "Untitled document"; row.appendChild(title);
    const meta  = document.createElement("div"); meta.className  = "sidebar-doc-meta";
    meta.textContent = fmtDate(doc.created_at); row.appendChild(meta);
    frag.appendChild(row);
  });
  return frag;
}

// CHANGE 4 — populate sidebar conv list (grouped by session)
function updateSidebarConvList(history) {
  const cL = document.getElementById("conv-list");
  if (!cL) return;
  cL.innerHTML = "";

  const sessions = new Map();
  const order    = [];
  history.forEach(function(t) {
    if (!sessions.has(t.session_id)) {
      sessions.set(t.session_id, { firstUser: null, lastAt: t.created_at });
      order.push(t.session_id);
    }
    const s = sessions.get(t.session_id);
    if (!s.firstUser && t.role === "user") s.firstUser = t.content;
    if (t.created_at > s.lastAt) s.lastAt = t.created_at;
  });

  order.sort(function(a, b) {
    return sessions.get(b).lastAt.localeCompare(sessions.get(a).lastAt);
  });

  if (!order.length) {
    const e = document.createElement("div"); e.className = "conv-item";
    e.style.cssText = "cursor:default;pointer-events:none;";
    e.textContent = "No conversations yet."; cL.appendChild(e); return;
  }

  order.forEach(function(sid) {
    const s    = sessions.get(sid);
    const raw  = s.firstUser || "Untitled";
    const text = raw.length > 32 ? raw.slice(0, 32) + "…" : raw;
    const item = document.createElement("div");
    item.className = "conv-item" + (sid === sessionId ? " active" : "");
    item.textContent = text;
    item.dataset.sid = sid;
    item.addEventListener("click", function() {
      loadConversation(sid, history);
    });
    cL.appendChild(item);
  });
}

// ── Case file (fetches once, updates mobile + sidebar) ─────
async function loadCaseFile(isInit) {
  try {
    const res  = await fetch("/case-file?user_id=" + encodeURIComponent(USER_ID));
    if (!res.ok) throw new Error("HTTP " + res.status);
    const data = await res.json();
    _caseFileCache = data;

    // Mobile panel
    const mH = document.getElementById("mobile-history-list");
    const mD = document.getElementById("mobile-docs-list");
    if (mH) { mH.innerHTML = ""; mH.appendChild(buildPanelRows(data.history, "No conversations yet.")); }
    if (mD) { mD.innerHTML = ""; mD.appendChild(buildDocRows(data.documents)); }

    // Sidebar (desktop)
    updateSidebarConvList(data.history);
    const dL = document.getElementById("sidebar-docs-list");
    if (dL) { dL.innerHTML = ""; dL.appendChild(buildSidebarDocRows(data.documents)); }

  } catch(e) { console.error("CASE FILE:", e); }
}

// ── Sidebar search ─────────────────────────────────────────
async function doSidebarSearch(query) {
  if (!query) { loadCaseFile(false); return; }
  try {
    const res  = await fetch("/case-file/search?user_id=" + encodeURIComponent(USER_ID) + "&q=" + encodeURIComponent(query));
    if (!res.ok) throw new Error("HTTP " + res.status);
    const data = await res.json();
    const cL   = document.getElementById("conv-list");
    if (cL) {
      cL.innerHTML = "";
      if (!data.results.length) {
        const e = document.createElement("div"); e.className = "sidebar-empty";
        e.textContent = "No results."; cL.appendChild(e);
      } else {
        data.results.forEach(function(r) {
          const item = document.createElement("div"); item.className = "conv-item";
          const text = r.content.length > 32 ? r.content.slice(0, 32) + "…" : r.content;
          item.textContent = text; item.dataset.sid = r.session_id;
          item.addEventListener("click", function() {
            if (_caseFileCache) loadConversation(r.session_id, _caseFileCache.history);
          });
          cL.appendChild(item);
        });
      }
    }
  } catch(e) { console.error("SIDEBAR SEARCH:", e); }
}

const sidebarSearch = document.getElementById("sidebar-search-input");
if (sidebarSearch) {
  sidebarSearch.addEventListener("keydown", function(e) {
    if (e.key === "Enter") doSidebarSearch(e.target.value.trim());
  });
  sidebarSearch.addEventListener("input", function() {
    if (!this.value.trim()) loadCaseFile(false);
  });
}

// ── Mobile search ──────────────────────────────────────────
async function doSearch(query) {
  if (!query) { loadCaseFile(); return; }
  try {
    const res  = await fetch("/case-file/search?user_id=" + encodeURIComponent(USER_ID) + "&q=" + encodeURIComponent(query));
    if (!res.ok) throw new Error("HTTP " + res.status);
    const data = await res.json();
    const mH   = document.getElementById("mobile-history-list");
    if (mH) { mH.innerHTML = ""; mH.appendChild(buildPanelRows(data.results, "No results.")); }
  } catch(e) { console.error("SEARCH:", e); }
}

document.getElementById("mobile-search-btn").addEventListener("click", function() {
  doSearch(document.getElementById("mobile-search-input").value.trim());
});
document.getElementById("mobile-search-input").addEventListener("keydown", function(e) {
  if (e.key === "Enter") doSearch(e.target.value.trim());
});

// ── Send ───────────────────────────────────────────────────
async function send() {
  hideEmptyState();
  const message = inputEl.value.trim();
  if (!message && !_pendingImageData) return;

  inputEl.value = ""; inputEl.style.height = ""; syncSendBtn(); sendBtn.disabled = true;

  const uTurn  = document.createElement("div"); uTurn.className  = "user-turn";
  const bubble = document.createElement("div"); bubble.className = "user-bubble";
  bubble.textContent = message || "(image)";
  uTurn.appendChild(bubble); convEl.appendChild(uTurn); convEl.scrollTop = convEl.scrollHeight;

  const thinking = makeThinkingEl(); convEl.appendChild(thinking); convEl.scrollTop = convEl.scrollHeight;

  const payload = { user_id: USER_ID, message };
  if (sessionId)         payload.session_id         = sessionId;
  if (_pendingImageData) { payload.image_data = _pendingImageData; payload.image_media_type = _pendingImageMediaType; }
  clearImage();

  try {
    const res = await fetch("/chat", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify(payload)
    });
    thinking.remove();

    if (!res.ok) {
      appendError("[HTTP " + res.status + "]"); sendBtn.disabled = false; inputEl.focus(); return;
    }
    const data = await res.json();
    sessionId = data.session_id;

    const aTurn = document.createElement("div"); aTurn.className = "atj-turn";
    if (data.fallback_triggered) {
      const fn = document.createElement("div"); fn.className = "fallback-note"; fn.textContent = "[compliance fallback]"; aTurn.appendChild(fn);
    }
    convEl.appendChild(aTurn); convEl.scrollTop = convEl.scrollHeight;

    function afterReveal() {
      stopBtn.hidden = true;
      (data.tool_blocks || []).forEach(function(block) {
        if (!block.compliant) return;
        if      (block.tool_name === "render_timeline")  renderTimeline(block.tool_input, aTurn);
        else if (block.tool_name === "render_checklist") renderChecklist(block.tool_input, aTurn);
        else if (block.tool_name === "render_choices")   renderChoices(block.tool_input, aTurn);
      });
      if (data.chips && data.chips.length) renderChips(data.chips, aTurn);
      if (data.sources && data.sources.length) {
        const s = document.createElement("div"); s.className = "sources-line";
        s.textContent = "Based on: " + data.sources.join(", "); aTurn.appendChild(s);
      }
      convEl.scrollTop = convEl.scrollHeight;
      sendBtn.disabled = false; inputEl.focus();
      // Refresh sidebar after reply lands so new session appears
      loadCaseFile(false);
    }

    if (data.response) {
      const tb = document.createElement("div"); tb.className = "atj-text"; aTurn.appendChild(tb);
      stopBtn.hidden = false; revealWords(tb, data.response.replace(/\[render_choices\]/gi, "").trim(), afterReveal);
    } else {
      afterReveal();
    }

  } catch(e) {
    thinking.remove();
    appendError("[error: " + e.message + "]");
    sendBtn.disabled = false; inputEl.focus();
  }
}

function appendError(msg) {
  const t  = document.createElement("div"); t.className  = "atj-turn";
  const el = document.createElement("div"); el.className = "atj-text";
  el.style.color = "var(--red)"; el.textContent = msg;
  t.appendChild(el); convEl.appendChild(t); convEl.scrollTop = convEl.scrollHeight;
}

// ── Wire send ──────────────────────────────────────────────
sendBtn.addEventListener("click", send);
inputEl.addEventListener("keydown", function(e) {
  if (e.key === "Enter" && !e.shiftKey) { e.preventDefault(); send(); }
});

// ── Init ───────────────────────────────────────────────────
inputEl.focus();
loadCaseFile(true);
</script>
